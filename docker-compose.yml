version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: task_sql
    environment:
      SA_PASSWORD: "YourStrong@Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build:
      context: ./src/TaskManagement.API
      dockerfile: Dockerfile
    container_name: task_api
    depends_on:
      - sqlserver
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=TaskDb;User=sa;Password=YourStrong@Pass123;TrustServerCertificate=True;
    ports:
      - "5000:80"

  client:
    build:
      context: ./client-app/task-management-ui
      dockerfile: Dockerfile
    container_name: task_client
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  sql_data: